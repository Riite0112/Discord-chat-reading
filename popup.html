<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discord Chat Reader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <div id="stateCard" class="stateCard">
        <div class="stateTop">
          <h1 id="titleText">Discord Chat Reader</h1>
          <span id="stateBadge" class="stateBadge">ON</span>
        </div>
        <p id="stateText" class="stateText"></p>
      </div>

      <label class="switchRow primarySwitch">
        <span id="enabledLabel" class="switchText"></span>
        <input id="enabled" type="checkbox">
      </label>

      <div class="buttonRow">
        <button id="latestButton" class="actionButton primary" type="button"></button>
        <button id="testButton" class="actionButton" type="button"></button>
      </div>
      <p id="testHint" class="panelHint testHint"></p>

      <label class="field">
        <span id="voiceLabel"></span>
        <select id="voiceName"></select>
      </label>

      <label class="field">
        <span id="rateLabel"></span>
        <input id="rate" type="range" min="0.7" max="2.0" step="0.1">
        <output id="rateValue"></output>
      </label>

      <label class="field">
        <span id="pitchLabel"></span>
        <input id="pitch" type="range" min="0.5" max="2.0" step="0.1">
        <output id="pitchValue"></output>
      </label>

      <label class="field">
        <span id="volumeLabel"></span>
        <input id="volume" type="range" min="0.2" max="1" step="0.1">
        <output id="volumeValue"></output>
      </label>

      <section class="section">
        <h2 id="rulesTitle"></h2>

        <label class="switchRow">
          <span id="readAuthorLabel" class="switchText"></span>
          <input id="readAuthorName" type="checkbox">
        </label>

        <label class="switchRow">
          <span id="announceLinksLabel" class="switchText"></span>
          <input id="announceLinks" type="checkbox">
        </label>

        <label class="switchRow">
          <span id="announceImagesLabel" class="switchText"></span>
          <input id="announceImages" type="checkbox">
        </label>

        <label class="switchRow">
          <span id="announceEmojiLabel" class="switchText"></span>
          <input id="announceEmojiMessages" type="checkbox">
        </label>

        <label class="switchRow">
          <span id="excludeAuthorsLabel" class="switchText"></span>
          <input id="excludeAuthorsEnabled" type="checkbox">
        </label>

        <div id="excludePanel" class="excludePanel">
          <p id="excludeHint" class="panelHint"></p>
          <div id="authorList" class="authorList"></div>
        </div>
      </section>

      <section class="section">
        <h2 id="performanceTitle"></h2>
        <p id="performanceHint" class="panelHint"></p>
        <div class="buttonRow single">
          <button id="openPerformanceButton" class="actionButton" type="button"></button>
        </div>
        <a id="helpLink" class="helpLink" href="https://support.google.com/chrome/answer/12929150?hl=ja" target="_blank" rel="noreferrer"></a>
      </section>

      <section class="section">
        <h2 id="logTitle"></h2>
        <div id="logList" class="logList"></div>
      </section>

      <p id="status" class="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
